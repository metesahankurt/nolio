name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      # `releases_created` is the reliable aggregate flag (always set). The
      # per-package tag output key varies, so the tag is resolved robustly in
      # the "Resolve release tag" step below.
      released: ${{ steps.release.outputs.releases_created }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Resolve release tag
        id: tag
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.release.outputs.tag_name }}"
          if [ -z "$TAG" ]; then
            TAG="${{ steps.release.outputs['.--tag_name'] }}"
          fi
          if [ -z "$TAG" ]; then
            TAG=$(gh release list --repo ${{ github.repository }} --limit 10 --json tagName -q ".[].tagName" | grep -E '^v[0-9]' | head -n 1)
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Set correct latest release
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ steps.tag.outputs.tag }}" ]; then
            gh release edit "${{ steps.tag.outputs.tag }}" --repo ${{ github.repository }} --latest
          fi

  # Automatically build and attach desktop installers (Windows .exe/.msi,
  # macOS .dmg, Linux packages) to the GitHub Release whenever release-please
  # cuts a new version of the root app. No manual dispatch needed.
  build-desktop:
    needs: release
    if: ${{ needs.release.outputs.released == 'true' }}
    uses: ./.github/workflows/build-desktop.yml
    with:
      tag_name: ${{ needs.release.outputs.tag }}
      build_windows: true
      build_macos: true
      build_linux: true
    secrets: inherit
    permissions:
      contents: write
