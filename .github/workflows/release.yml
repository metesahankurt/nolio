name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      # Root app (manifest path ".") — release-please prefixes per-package
      # outputs with the package path.
      app_released: ${{ steps.release.outputs['.--release_created'] }}
      app_tag: ${{ steps.release.outputs['.--tag_name'] }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Set correct latest release
        if: ${{ steps.release.outputs.releases_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(gh release list --repo ${{ github.repository }} --limit 10 --json tagName -q ".[].tagName" | grep -E '^v[0-9]' | head -n 1)
          if [ -n "$LATEST_TAG" ]; then
            gh release edit "$LATEST_TAG" --repo ${{ github.repository }} --latest
          fi

  # Automatically build and attach desktop installers (Windows .exe/.msi,
  # macOS .dmg, Linux packages) to the GitHub Release whenever release-please
  # cuts a new version of the root app. No manual dispatch needed.
  build-desktop:
    needs: release
    if: ${{ needs.release.outputs.app_released == 'true' }}
    uses: ./.github/workflows/build-desktop.yml
    with:
      tag_name: ${{ needs.release.outputs.app_tag }}
      build_windows: true
      build_macos: true
      build_linux: true
    secrets: inherit
    permissions:
      contents: write
